<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adotfy - Buscar pets</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pets.css">
</head>
<body>
    <!-- Header -->
    <header>
        <iframe src="./nav.html" frameborder="0" width="100%"></iframe>
    </header>

    <!-- Main -->
    <main>
        <section class="main__pets">
            <h2>Confira a lista de pets disponíveis para adoção.</h2>

            <div class="pets__box flex">
                <!-- Exemplo de card de pet -->
                <div class="pets__card flex">
                    <img src="./assets/imagens/image 3.png" alt="Pet 1">
                    <div class="pets__card-text flex">
                        <p>Nome: <span></span></p>
                        <p>Idade: <span></span></p>
                        <p>Localização: <span></span></p>
                    </div>
                    <button><a href="./formulario.html" class="enviar">Adotar</a></button>
                </div>

                <div class="pets__card flex">
                    <img src="./assets/imagens/image 5.png" alt="Pet 2">
                    <div class="pets__card-text flex">
                        <p>Nome: <span></span></p>
                        <p>Idade: <span></span></p>
                        <p>Localização: <span></span></p>
                    </div>
                    <button><a href="./formulario.html" class="enviar">Adotar</a></button>
                </div>

                <div class="pets__card flex">
                    <img src="./assets/imagens/image.png" alt="Pet 3">
                    <div class="pets__card-text flex">
                        <p>Nome: <span></span></p>
                        <p>Idade: <span></span></p>
                        <p>Localização: <span></span></p>
                    </div>
                    <button><a href="./formulario.html" class="enviar">Adotar</a></button>
                </div>

                <div class="pets__card flex">
                    <img src="./assets/imagens/image 1.png" alt="Pet 4">
                    <div class="pets__card-text flex">
                        <p>Nome: <span></span></p>
                        <p>Idade: <span></span></p>
                        <p>Localização: <span></span></p>
                    </div>
                    <button><a href="./formulario.html" class="enviar">Adotar</a></button>
                </div>

                <!-- Você pode duplicar cards conforme precisar, sempre com caminhos corretos -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <iframe src="./footer.html" frameborder="0"></iframe>
    </footer>
</body>
</html>
